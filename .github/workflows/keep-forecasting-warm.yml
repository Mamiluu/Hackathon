name: Keep forecasting service warm

# Render's free tier spins the service down after ~15 min of no inbound traffic,
# and a cold start takes 30-60+ seconds -- unacceptable mid-demo. Pinging /health
# every 10 minutes keeps it warm continuously, well inside that window.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (retry through a cold start if needed)
        run: |
          url="https://afyapulse-forecasting.onrender.com/health"
          for attempt in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$url")
            echo "attempt $attempt: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "service is warm"
              exit 0
            fi
            sleep 15
          done
          echo "::warning::forecasting service did not return 200 after 4 attempts"
